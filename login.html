<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LHDN eReceipt</title>

    <link rel="icon" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

    <header>

        <a href="index.html" class="logo">

            <img src="logo.png" alt="Logo">

            <div class="logo-text">
                <h2>LHDN</h2>
                <p>eReceipt</p>
            </div>

        </a>

        <div class="menu-toggle" id="menuToggle">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <nav id="navbar">

            <a href="index.html">Home</a>
            <a href="index.html#features">Features</a>
            <a href="index.html#about">About</a>
            <a href="index.html#contact">Contact</a>

            <a href="register.html" class="login-btn">Register</a>

        </nav>

    </header>

    <main class="login-page">

        <div class="login-card">

            <div class="logo-top">

                <img src="logo.png" alt="Logo">

                <h2>Welcome Back</h2>

                <p>Sign in to your LHDN eReceipt account</p>

            </div>

            <form id="loginForm">

                <div class="form-group">

                    <label>Email Address</label>

                    <div class="input-box">

                        <i class="fa-solid fa-envelope"></i>

                        <input id="email" type="email" placeholder="name@email.com">

                    </div>

                </div>

                <div class="form-group">

                    <label>Password</label>

                    <div class="input-box">

                        <i class="fa-solid fa-lock"></i>

                        <input id="password" type="password" placeholder="Enter your password">

                        <i id="togglePassword" class="fa-solid fa-eye password-toggle"></i>

                    </div>

                </div>

                <div class="options">

                    <label>
                        <input type="checkbox">
                        Remember Me
                    </label>

                    <a href="#">Forgot Password?</a>

                </div>

                <button id="loginButton" class="login-main-btn" type="submit">
                    Login
                </button>

                <button class="register-btn" type="button"
                    onclick="location.href='register.html'">
                    Create New Account
                </button>

            </form>

        </div>

    </main>

    <footer>

        <p>
            © 2026 LHDN eReceipt • AI-Powered Progressive Web Application
        </p>

    </footer>

    <script src="script.js"></script>

</body>

</html>
