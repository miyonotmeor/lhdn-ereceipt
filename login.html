<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Login - LHDN eReceipt</title><link rel="icon" href="logo.png"><link rel="apple-touch-icon" href="logo.png"><link rel="stylesheet" href="style.css"><style>
body{background:#f5f6f8}.login-page{min-height:calc(100vh - 110px);display:flex;justify-content:center;align-items:center;padding:60px 20px}.login-card{background:#fff;max-width:460px;width:100%;padding:40px;border-radius:28px;box-shadow:0 15px 40px rgba(0,0,0,.08)}.logo-top{text-align:center;margin-bottom:25px}.logo-top img{width:72px}.logo-top h2{color:#1A3D8F}.form-group{margin-bottom:18px}.form-group label{display:block;font-weight:600;margin-bottom:8px}.form-group input{width:100%;padding:14px 16px;border:2px solid #ddd;border-radius:14px}.password-wrap{position:relative}.password-wrap input{padding-right:50px}.toggle-password{position:absolute;right:15px;top:50%;transform:translateY(-50%);cursor:pointer}.options{display:flex;justify-content:space-between;font-size:14px;margin:10px 0 24px}.login-btn-full,.register-btn{display:block;width:100%;padding:15px;text-align:center;border-radius:50px;font-weight:700;text-decoration:none}.login-btn-full{background:#FFC72C;border:none}.register-btn{margin-top:15px;border:2px solid #FFC72C;background:#fff;color:#222}@media(max-width:576px){.login-card{padding:28px}}
</style></head><body>
<header><div class="logo"><img src="logo.png"><div class="logo-text"><h2>LHDN</h2><p>eReceipt</p></div></div><div class="menu-toggle" id="menuToggle"><span></span><span></span><span></span></div><nav id="navbar"><a href="index.html">Home</a><a href="index.html#features">Features</a><a href="index.html#about">About</a><a href="index.html#contact">Contact</a><a href="login.html" class="login-btn">Login</a></nav></header>
<section class="login-page"><div class="login-card"><div class="logo-top"><img src="logo.png"><h2>Welcome Back</h2><p>Sign in to your LHDN eReceipt account</p></div><form><div class="form-group"><label>Email Address</label><input type="email" placeholder="name@email.com"></div><div class="form-group"><label>Password</label><div class="password-wrap"><input id="password" type="password" placeholder="Enter password"><span id="togglePassword" class="toggle-password">👁️</span></div></div><div class="options"><label><input type="checkbox"> Remember Me</label><a href="#">Forgot Password?</a></div><button class="login-btn-full" type="submit">Login</button><a class="register-btn" href="register.html">Create New Account</a></form></div></section>
<footer><p>© 2026 LHDN eReceipt • AI-Powered Progressive Web Application</p></footer>
<script>
const mt=document.getElementById('menuToggle'),nb=document.getElementById('navbar');
if(mt){mt.onclick=()=>{nb.classList.toggle('active');mt.classList.toggle('active');};}
const eye=document.getElementById('togglePassword'),pw=document.getElementById('password');
eye.onclick=()=>{if(pw.type==='password'){pw.type='text';eye.textContent='🙈';}else{pw.type='password';eye.textContent='👁️';}};
</script></body></html>
