<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LHDN eReceipt</title>

    <link rel="icon" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

<header>

    <a href="index.html" class="logo">
        <img src="logo.png" alt="Logo">

        <div class="logo-text">
            <h2>LHDN</h2>
            <p>eReceipt</p>
        </div>
    </a>

    <div class="menu-toggle" id="menuToggle">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <nav id="navbar">

        <a href="index.html">Home</a>
        <a href="index.html#features">Features</a>
        <a href="index.html#about">About</a>
        <a href="index.html#contact">Contact</a>

        <a href="register.html" class="login-btn">Register</a>

    </nav>

</header>

<main class="login-page">

    <div class="login-card">

        <div class="logo-top">

            <img src="logo.png" alt="Logo">

            <h2>Welcome Back</h2>
            <p>Sign in to your LHDN eReceipt account</p>

        </div>

        <form id="loginForm">

            <div class="form-group">
                <label>Email Address</label>
                <div class="input-box">
                    <i class="fa-solid fa-envelope"></i>
                    <input id="email" type="email" placeholder="name@email.com" required>
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-box">
                    <i class="fa-solid fa-lock"></i>
                    <input id="password" type="password" placeholder="Enter your password" required>
                    <i id="togglePassword" class="fa-solid fa-eye password-toggle"></i>
                </div>
            </div>

            <div class="options">
                <label>
                    <input type="checkbox" id="rememberMe">
                    Remember Me
                </label>

                <a href="forgot-password.html" id="forgotLink">Forgot Password?</a>
            </div>

            <button id="loginButton" class="login-main-btn" type="submit">
                Login
            </button>

            <button class="register-btn" type="button" onclick="location.href='register.html'">
                Create New Account
            </button>

        </form>

    </div>

</main>

<footer>
    <p>© 2026 LHDN eReceipt • AI-Powered Progressive Web Application</p>
</footer>

<script>
/* =========================
   ALWAYS START TOP
========================= */
if ("scrollRestoration" in history) {
    history.scrollRestoration = "manual";
}
window.addEventListener("load", () => window.scrollTo(0, 0));
window.addEventListener("pageshow", () => window.scrollTo(0, 0));

/* =========================
   LOGIN ENGINE
========================= */
const loginForm = document.getElementById("loginForm");

loginForm.addEventListener("submit", function(e) {
    e.preventDefault();

    const email = document.getElementById("email").value.trim().toLowerCase();
    const password = document.getElementById("password").value;

    let users = JSON.parse(localStorage.getItem("users")) || [];

    const user = users.find(u => u.email === email);

    if (!user) {
        alert("Account not found");
        return;
    }

    if (user.password !== password) {
        alert("Wrong password");
        return;
    }

    // REMEMBER ME FIX
    const remember = document.getElementById("rememberMe").checked;

    if (remember) {
        localStorage.setItem("loggedUser", JSON.stringify(user));
    } else {
        sessionStorage.setItem("loggedUser", JSON.stringify(user));
    }

    window.location.href = "dashboard.html";
});

/* =========================
   AUTO FILL PASSWORD (REMEMBER ME)
========================= */
window.addEventListener("load", () => {
    const savedUser = JSON.parse(localStorage.getItem("loggedUser"));
    if (savedUser) {
        document.getElementById("email").value = savedUser.email;
        document.getElementById("password").value = savedUser.password;
        document.getElementById("rememberMe").checked = true;
    }
});

/* =========================
   PASSWORD TOGGLE
========================= */
const password = document.getElementById("password");
const togglePassword = document.getElementById("togglePassword");

togglePassword.addEventListener("click", () => {
    if (password.type === "password") {
        password.type = "text";
        togglePassword.classList.replace("fa-eye", "fa-eye-slash");
    } else {
        password.type = "password";
        togglePassword.classList.replace("fa-eye-slash", "fa-eye");
    }
});

/* =========================
   FORGOT PASSWORD LINK FIX
========================= */
document.getElementById("forgotLink").addEventListener("click", (e) => {
    e.preventDefault();
    window.location.href = "forgot-password.html";
});

</script>

</body>
</html>
