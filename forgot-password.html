<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - LHDN eReceipt</title>

    <link rel="icon" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

    <!-- HEADER (same as login/register) -->
    <header>

        <a href="index.html" class="logo">

            <img src="logo.png" alt="Logo">

            <div class="logo-text">
                <h2>LHDN</h2>
                <p>eReceipt</p>
            </div>

        </a>

        <div class="menu-toggle" id="menuToggle">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <nav id="navbar">

            <a href="index.html">Home</a>
            <a href="index.html#features">Features</a>
            <a href="index.html#about">About</a>
            <a href="index.html#contact">Contact</a>

            <a href="login.html" class="login-btn">Login</a>

        </nav>

    </header>

    <!-- MAIN CARD -->
    <main class="login-page">

        <div class="login-card">

            <div class="logo-top">

                <img src="logo.png" alt="Logo">

                <h2>Forgot Password</h2>

                <p>Enter your email to reset your password</p>

            </div>

            <form id="forgotForm">

                <div class="form-group">

                    <label>Email Address</label>

                    <div class="input-box">

                        <i class="fa-solid fa-envelope"></i>

                        <input type="email" id="resetEmail" placeholder="name@email.com" required>

                    </div>

                </div>

                <button type="submit" class="login-main-btn">
                    Reset Password
                </button>

                <button type="button" class="register-btn"
                    onclick="location.href='login.html'">
                    Back to Login
                </button>

            </form>

        </div>

    </main>

    <footer>

        <p>
            © 2026 LHDN eReceipt • AI-Powered Progressive Web Application
        </p>

    </footer>

    <script src="script.js"></script>

    <!-- Forgot Password Logic -->
    <script>
        const forgotForm = document.getElementById("forgotForm");

        if (forgotForm) {

            forgotForm.addEventListener("submit", function (e) {
                e.preventDefault();

                const email = document.getElementById("resetEmail").value.trim().toLowerCase();
                let users = JSON.parse(localStorage.getItem("users")) || [];

                const user = users.find(u => u.email === email);

                // ❌ EMAIL NOT FOUND
                if (!user) {
                    if (confirm("No account found with this email.\n\nGo to Register page?")) {
                        window.location.href = "register.html";
                    }
                    return;
                }

                // 🔑 NEW PASSWORD INPUT
                const newPassword = prompt("Enter your new password:");

                if (!newPassword) return;

                user.password = newPassword;

                localStorage.setItem("users", JSON.stringify(users));

                alert("Password reset successful!");

                window.location.href = "login.html";
            });

        }
    </script>

</body>

</html>
