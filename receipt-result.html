<!DOCTYPE html>
<html>
<head>
    <title>Receipt Result - LHDN eReceipt</title>

    <link rel="stylesheet" href="style.css">

    <style>
        body{
            font-family:'Poppins',sans-serif;
            background:#f5f6f8;
        }

        .result-container{
            padding:40px 8%;
        }

        .box{
            background:white;
            padding:25px;
            border-radius:20px;
            margin-bottom:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.08);
            animation:fadeUp .6s ease;
        }

        .preview-img{
            width:100%;
            border-radius:15px;
        }

        .btn{
            background:#FFC72C;
            border:none;
            padding:14px 25px;
            border-radius:30px;
            font-weight:700;
            cursor:pointer;
            width:100%;
            transition:.3s;
        }

        .btn:hover{
            transform:translateY(-3px);
            box-shadow:0 10px 25px rgba(255,199,44,.4);
        }

        .official{
            padding:20px;
            border:2px dashed #1A3D8F;
            border-radius:15px;
            background:#f9fbff;
        }

        .status{
            font-weight:700;
            color:#1A3D8F;
        }

        /* empty state */
        .empty{
            text-align:center;
            padding:60px;
            color:#666;
        }

        @keyframes fadeUp{
            from{
                opacity:0;
                transform:translateY(30px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }
    </style>
</head>

<body>

<header>
    <h2>LHDN eReceipt</h2>
</header>

<div class="result-container">

    <!-- EXTRACTED DATA -->
    <div class="box">
        <h2>Extracted Data</h2>
        <p id="amount">Amount: -</p>
        <p id="date">Date: -</p>
        <p id="tax">Tax: -</p>
        <p id="total">Total: -</p>
        <p class="status" id="status">Status: pending</p>
    </div>

    <!-- ORIGINAL IMAGE -->
    <div class="box">
        <h2>Original Receipt</h2>
        <img id="originalImage" class="preview-img">
    </div>

    <!-- OFFICIAL PREVIEW -->
    <div class="box">
        <h2>Official Preview</h2>

        <div class="official">
            <h3>LHDN eReceipt (System Generated)</h3>
            <p id="oAmount"></p>
            <p id="oDate"></p>
            <p id="oTax"></p>
            <p id="oTotal"></p>
            <p>Status: Pending Verification</p>
        </div>

    </div>

    <button class="btn" onclick="saveReceipt()">
        Save Receipt
    </button>

</div>

<script>
/* =========================
   GET RECEIPT (SAFE ENGINE)
========================= */

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

let receipts = JSON.parse(localStorage.getItem("receipts")) || [];

const receipt = receipts.find(r => r.id == id);

/* =========================
   EMPTY STATE FIX
========================= */

if (!receipt) {
    document.body.innerHTML = `
        <div class="empty">
            <h2>No Receipt Found</h2>
            <p>Please scan a receipt first.</p>
            <button class="btn" onclick="location.href='scan.html'">Go to Scan</button>
        </div>
    `;
}

/* =========================
   CALC ENGINE
========================= */

const amount = parseFloat((receipt.amount || "0").replace(/[^\d.]/g, ""));
const tax = receipt.tax ?? amount * 0.06;
const total = receipt.total ?? (amount + tax);

/* =========================
   RENDER DATA
========================= */

document.getElementById("amount").textContent = "Amount: RM" + amount.toFixed(2);
document.getElementById("date").textContent = "Date: " + (receipt.date || "Unknown");

document.getElementById("tax").textContent = "Tax (6% SST): RM" + tax.toFixed(2);
document.getElementById("total").textContent = "Total: RM" + total.toFixed(2);

document.getElementById("status").textContent = "Status: " + (receipt.status || "pending");

document.getElementById("originalImage").src = receipt.image;

/* OFFICIAL */
document.getElementById("oAmount").textContent = "Amount: RM" + amount.toFixed(2);
document.getElementById("oDate").textContent = "Date: " + (receipt.date || "Unknown");
document.getElementById("oTax").textContent = "Tax: RM" + tax.toFixed(2);
document.getElementById("oTotal").textContent = "Total: RM" + total.toFixed(2);

/* =========================
   SAVE ENGINE (SYNC FIX)
========================= */

function saveReceipt(){

    let receipts = JSON.parse(localStorage.getItem("receipts")) || [];

    const index = receipts.findIndex(r => r.id == id);

    if(index !== -1){
        receipts[index].status = "verified";
        receipts[index].tax = tax;
        receipts[index].total = total;
    }

    localStorage.setItem("receipts", JSON.stringify(receipts));

    alert("Receipt saved successfully!");

    window.location.href = "dashboard.html";
}
</script>

</body>
</html>
