<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - LHDN eReceipt</title>

<link rel="icon" href="logo.png">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>
body{
    margin:0;
    font-family:Poppins, Arial, sans-serif;
}

/* FORCE VISIBILITY FIX */
.hidden{opacity:1 !important; transform:none !important;}
.show{opacity:1 !important; transform:none !important;}

.dashboard{
    padding:40px 8%;
}

.welcome{
    background:linear-gradient(135deg,#1A3D8F,#2b5fd1);
    color:white;
    padding:35px;
    border-radius:25px;
    margin-bottom:30px;
}

.stats,.actions{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:30px;
}

.card,.action,.table-card{
    background:white;
    border-radius:20px;
    padding:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.action button{
    margin-top:10px;
    padding:10px 20px;
    border:none;
    border-radius:30px;
    background:#FFC72C;
    cursor:pointer;
    font-weight:bold;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:12px;
    border-bottom:1px solid #eee;
    text-align:left;
}
</style>

</head>

<body>

<header>
    <a href="index.html" class="logo">
        <img src="logo.png" style="height:40px;">
        <div>
            <h2>LHDN</h2>
            <p>eReceipt</p>
        </div>
    </a>

    <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="scan.html">Scan</a>
        <a href="history.html">History</a>
        <a href="reports.html">Reports</a>
        <a href="#" id="logoutLink" style="color:red;">Logout</a>
    </nav>
</header>

<main class="dashboard">

<section class="welcome">
    <h1 id="welcomeName">Hi 👋</h1>
    <p>Manage all your LHDN eReceipts in one place.</p>
</section>

<section class="stats">

    <div class="card">
        <i class="fa-solid fa-file-invoice"></i>
        <p>Total Receipts</p>
        <h2 id="totalReceipts">0</h2>
    </div>

    <div class="card">
        <i class="fa-solid fa-circle-check"></i>
        <p>Verified</p>
        <h2 id="verifiedReceipts">0</h2>
    </div>

    <div class="card">
        <i class="fa-solid fa-clock"></i>
        <p>Pending</p>
        <h2 id="pendingReceipts">0</h2>
    </div>

    <div class="card">
        <i class="fa-solid fa-money-bill-wave"></i>
        <p>Total Tax Paid</p>
        <h2 id="totalTaxPaid">RM0.00</h2>
    </div>

</section>

<section class="actions">

    <div class="action">
        <h3>Scan Receipt</h3>
        <button onclick="location.href='scan.html'">Open</button>
    </div>

    <div class="action">
        <h3>History</h3>
        <button onclick="location.href='history.html'">Open</button>
    </div>

    <div class="action">
        <h3>Analytics</h3>
        <button onclick="location.href='analytics.html'">Open</button>
    </div>

    <div class="action">
        <h3>Reports</h3>
        <button onclick="location.href='reports.html'">Open</button>
    </div>

</section>

<section class="table-card">

    <h2>Recent Receipts</h2>

    <table>
        <thead>
            <tr>
                <th>Year</th>
                <th>Date</th>
                <th>Amount</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="receiptTable">
            <tr>
                <td colspan="4" style="text-align:center;">No receipts found</td>
            </tr>
        </tbody>
    </table>

</section>

</main>

<script>
document.addEventListener("DOMContentLoaded", () => {

    try {

        const user = JSON.parse(localStorage.getItem("loggedUser"));
        if (user && document.getElementById("welcomeName")) {
            document.getElementById("welcomeName").textContent = "Hi, " + user.fullname;
        }

        const receipts = JSON.parse(localStorage.getItem("receipts") || "[]");

        document.getElementById("totalReceipts").textContent = receipts.length;

        const verified = receipts.filter(r => r.status === "verified").length;
        const pending = receipts.filter(r => r.status === "pending").length;

        document.getElementById("verifiedReceipts").textContent = verified;
        document.getElementById("pendingReceipts").textContent = pending;

        let totalTax = 0;

        receipts.forEach(r => {
            let amt = parseFloat((r.amount || "0").replace(/[^\d.]/g, ""));
            if (!isNaN(amt)) totalTax += amt;
        });

        document.getElementById("totalTaxPaid").textContent = "RM" + totalTax.toFixed(2);

        const table = document.getElementById("receiptTable");
        table.innerHTML = "";

        if (receipts.length === 0) {
            table.innerHTML = `<tr><td colspan="4" style="text-align:center;">No receipts found</td></tr>`;
            return;
        }

        receipts.slice().reverse().forEach(r => {
            table.innerHTML += `
                <tr>
                    <td>${new Date(r.createdAt || Date.now()).getFullYear()}</td>
                    <td>${r.date || "-"}</td>
                    <td>${r.amount || "RM0.00"}</td>
                    <td>${r.status || "pending"}</td>
                </tr>
            `;
        });

    } catch (e) {
        console.log("Dashboard error fixed:", e);
    }

});
</script>

</body>
</html>
