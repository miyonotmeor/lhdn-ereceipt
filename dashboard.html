<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - LHDN eReceipt</title>

<link rel="icon" href="logo.png">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f5f6f8;
}

/* HEADER (MATCH INDEX/LOGIN STYLE) */
header{
    width:100%;
    background:rgba(255,255,255,.88);
    backdrop-filter:blur(14px);
    position:sticky;
    top:0;
    z-index:999;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 8%;
    box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.logo{
    display:flex;
    align-items:center;
    gap:12px;
    text-decoration:none;
    color:inherit;
}

.logo img{
    width:45px;
    height:45px;
}

/* NAV */
nav{
    display:flex;
    gap:25px;
    align-items:center;
}

nav a{
    text-decoration:none;
    font-weight:600;
    color:#222;
}

.logout-btn{
    background:#FFC72C;
    padding:10px 18px;
    border-radius:30px;
}

/* DASHBOARD */
.dashboard{
    padding:40px 8%;
}

/* WELCOME */
.welcome{
    background:linear-gradient(135deg,#1A3D8F,#2b5fd1);
    color:white;
    padding:35px;
    border-radius:25px;
    margin-bottom:30px;
}

/* STATS + ACTIONS */
.stats,.actions{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:30px;
}

.card,.action,.table-card{
    background:white;
    border-radius:20px;
    padding:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
}

/* BUTTONS */
.action button{
    margin-top:10px;
    padding:10px 20px;
    border:none;
    border-radius:30px;
    background:#FFC72C;
    cursor:pointer;
    font-weight:700;
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:12px;
    border-bottom:1px solid #eee;
    text-align:left;
}

/* FORCE SHOW (FIX BLANK ISSUE) */
.hidden,.show{
    opacity:1 !important;
    transform:none !important;
}

</style>

</head>

<body>

<header>

    <a href="index.html" class="logo">
        <img src="logo.png">
        <div>
            <h2>LHDN</h2>
            <p>eReceipt</p>
        </div>
    </a>

    <nav>
        <a href="index.html">Home</a>
        <a href="index.html#features">Features</a>
        <a href="index.html#about">About</a>
        <a href="index.html#contact">Contact</a>
        <a href="logout.html" class="logout-btn" id="logoutLink">Logout</a>
    </nav>

</header>

<main class="dashboard">

<section class="welcome">
    <h1 id="welcomeName">Hi 👋</h1>
    <p>Manage all your LHDN eReceipts in one place.</p>
</section>

<section class="stats">

    <div class="card">
        <i class="fa-solid fa-file-invoice"></i>
        <p>Total Receipts</p>
        <h2 id="totalReceipts">0</h2>
    </div>

    <div class="card">
        <i class="fa-solid fa-circle-check"></i>
        <p>Verified</p>
        <h2 id="verifiedReceipts">0</h2>
    </div>

    <div class="card">
        <i class="fa-solid fa-clock"></i>
        <p>Pending</p>
        <h2 id="pendingReceipts">0</h2>
    </div>

    <div class="card">
        <i class="fa-solid fa-money-bill-wave"></i>
        <p>Total Tax Paid</p>
        <h2 id="totalTaxPaid">RM0.00</h2>
    </div>

</section>

<section class="actions">

    <div class="action">
        <h3>Scan Receipt</h3>
        <button onclick="location.href='scan.html'">Open</button>
    </div>

    <div class="action">
        <h3>History</h3>
        <button onclick="location.href='history.html'">Open</button>
    </div>

    <div class="action">
        <h3>Analytics</h3>
        <button onclick="location.href='analytics.html'">Open</button>
    </div>

    <div class="action">
        <h3>Reports</h3>
        <button onclick="location.href='reports.html'">Open</button>
    </div>

</section>

<section class="table-card">

    <h2>Recent Receipts</h2>

    <table>
        <thead>
            <tr>
                <th>Year</th>
                <th>Date</th>
                <th>Amount</th>
                <th>Status</th>
            </tr>
        </thead>

        <tbody id="receiptTable">
            <tr>
                <td colspan="4" style="text-align:center;">No receipts found</td>
            </tr>
        </tbody>
    </table>

</section>

</main>

<script>
document.addEventListener("DOMContentLoaded", () => {

    // FIX SCROLL TOP
    window.scrollTo(0,0);

    // USER
    const user = JSON.parse(localStorage.getItem("loggedUser"));
    if (user) {
        document.getElementById("welcomeName").textContent = "Hi, " + user.fullname;
    }

    // RECEIPTS
    const receipts = JSON.parse(localStorage.getItem("receipts") || "[]");

    document.getElementById("totalReceipts").textContent = receipts.length;
    document.getElementById("verifiedReceipts").textContent = receipts.filter(r=>r.status==="verified").length;
    document.getElementById("pendingReceipts").textContent = receipts.filter(r=>r.status==="pending").length;

    let totalTax = 0;
    receipts.forEach(r=>{
        let amt = parseFloat((r.amount||"0").replace(/[^\d.]/g,""));
        if(!isNaN(amt)) totalTax += amt;
    });

    document.getElementById("totalTaxPaid").textContent = "RM" + totalTax.toFixed(2);

    // TABLE
    const table = document.getElementById("receiptTable");
    table.innerHTML = "";

    receipts.slice().reverse().forEach(r=>{
        table.innerHTML += `
        <tr>
            <td>${new Date(r.createdAt||Date.now()).getFullYear()}</td>
            <td>${r.date||"-"}</td>
            <td>${r.amount||"RM0.00"}</td>
            <td>${r.status||"pending"}</td>
        </tr>`;
    });

});

</script>

</body>
</html>
