<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scan Receipt - LHDN eReceipt</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

<header>
    <a href="dashboard.html" class="logo">
        <img src="logo.png">
        <div class="logo-text">
            <h2>LHDN</h2>
            <p>eReceipt</p>
        </div>
    </a>
</header>

<main class="login-page">

    <div class="login-card">

        <div class="logo-top">
            <h2>Scan Receipt</h2>
            <p>Capture or upload LHDN receipt</p>
        </div>

        <video id="camera" autoplay playsinline style="width:100%; border-radius:20px;"></video>

        <button id="captureBtn" class="login-main-btn">
            Capture Receipt
        </button>

        <input type="file" id="uploadInput" accept="image/*" class="register-btn">

        <canvas id="canvas" style="display:none;"></canvas>

    </div>

</main>

<script src="scan.js"></script>

</body>
</html>
