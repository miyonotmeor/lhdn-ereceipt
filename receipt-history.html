<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Receipt History | LHDN E-Receipt</title>

    <link rel="stylesheet"
          href="style.css">

    <link rel="stylesheet"
          href="receipt-details.css">

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<header>

    <div class="container nav-container">

    <div class="logo">

        <img src="logo.png"
             alt="LHDN Logo">

        <div>

            <h2>LHDN E-Receipt</h2>

            <p>AI Powered Receipt Management</p>

        </div>

    </div>

    <div class="dashboard-user">

        <div class="user-avatar">

            <i class="fa-solid fa-user"></i>

        </div>

        <div>

            <strong id="dashboardUsername">

                Loading...

            </strong>

            <p>

                Receipt History

            </p>

        </div>

    </div>

            </div>

    </div>

</header>

<main class="receipt-details-page">

    <section class="page-title">

        <span class="badge">

            AI OCR Result

        </span>

        <h1>

            Receipt History

        </h1>

        <p>

            View and manage all of your saved LHDN receipts.

        </p>

    </section>

  <section class="history-container">

    <div id="receiptHistoryList">

        <!-- JavaScript will generate receipts here -->

    </div>

</section>

<section class="receipt-actions">

    <button id="backButton"
            class="secondary-button">

        <i class="fa-solid fa-arrow-left"></i>

        Back

    </button>

    <button id="saveReceiptButton"
            class="primary-button">

        <i class="fa-solid fa-floppy-disk"></i>

        Save Receipt

    </button>

    <button id="dashboardButton"
            class="secondary-button">

        <i class="fa-solid fa-house"></i>

        Dashboard

    </button>

</section>

</main>

<footer>

    <div class="footer-left">

        <img src="logo.png"
             alt="LHDN Logo">

        <div>

            <h3>LHDN E-Receipt</h3>

            <p>AI Powered Receipt Management</p>

        </div>

    </div>

    <div class="footer-right">

        <p>

            © 2026 LHDN E-Receipt

        </p>

        <p>

            Developed by Amirrul Mukminin

        </p>

    </div>

</footer>

<script src="receipt.js"></script>
<script src="receipt-history.js"></script>

</body>

</html>
